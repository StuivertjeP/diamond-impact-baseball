<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diamond Impact — Games</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Bebas+Neue&family=Barlow+Condensed:wght@600;700&display=swap');
    :root {
      --navy:#060B14; --navy2:#0E1A2E; --navy3:#122040;
      --gold:#D4942A; --goldL:#F0B840;
      --white:#EEF2F8; --mist:#8EA8C8; --mist-dark:#5A7A9A;
      --blue:#1E5FAD; --blueB:#4A9AEC;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      background:var(--navy);color:var(--white);
      font-family:'Barlow Condensed',sans-serif;
      display:flex;flex-direction:column;align-items:center;
      padding:2rem 1rem 3rem;min-height:100dvh;
    }

    /* ── Header ── */
    .hub-header{text-align:center;margin-bottom:2rem;}
    .hub-title{
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(2.5rem,8vw,4.5rem);
      color:var(--white);letter-spacing:.05em;line-height:.95;
    }
    .hub-title em{color:var(--gold);font-style:normal;}
    .hub-sub{
      font-size:clamp(.7rem,1.8vw,.9rem);
      font-weight:600;letter-spacing:.2em;text-transform:uppercase;
      color:var(--mist);margin-top:.6rem;
    }

    /* ── Toggle tabs ── */
    .game-tabs{
      display:flex;
      gap:2px;
      margin-bottom:0;
      width:100%;
      max-width:580px;
    }
    .tab-btn{
      flex:1;
      padding:.85rem 1rem;
      font-family:'Press Start 2P',monospace;
      font-size:7px;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--mist-dark);
      background:var(--navy2);
      border:1px solid var(--navy3);
      cursor:pointer;
      transition:all .2s;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:6px;
      line-height:1.6;
    }
    .tab-btn .tab-icon{font-size:18px;line-height:1;}
    .tab-btn .tab-name{color:var(--mist-dark);}
    .tab-btn .tab-desc{font-size:5.5px;color:var(--mist-dark);opacity:.6;letter-spacing:.06em;}
    .tab-btn.active{
      background:rgba(212,148,42,.12);
      border-color:rgba(212,148,42,.4);
      color:var(--gold);
    }
    .tab-btn.active .tab-name{color:var(--gold);}
    .tab-btn.active .tab-icon{filter:drop-shadow(0 0 4px rgba(212,148,42,.5));}

    /* ── Game frame container ── */
    .game-frames{width:100%;max-width:580px;}
    .game-frame{display:none;width:100%;}
    .game-frame.active{display:block;}

    iframe{
      width:100%;
      border:none;
      display:block;
      border:1px solid var(--navy3);
    }

    /* ── Instructions strip ── */
    .instructions{
      width:100%;max-width:580px;
      margin-top:0;
      padding:.75rem 1.25rem;
      background:var(--navy2);
      border:1px solid var(--navy3);
      border-top:none;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:1.5rem;
      flex-wrap:wrap;
    }
    .instr-item{
      display:flex;align-items:center;gap:.4rem;
      font-size:.68rem;font-weight:700;letter-spacing:.1em;
      text-transform:uppercase;color:var(--mist-dark);
    }
    .key{
      display:inline-flex;align-items:center;justify-content:center;
      border:1.5px solid var(--navy3);border-radius:3px;
      padding:3px 8px;font-family:'Press Start 2P',monospace;
      font-size:6px;color:var(--mist);background:var(--navy);
      white-space:nowrap;
    }

    /* ── Back to site link ── */
    .back-link{
      margin-top:2rem;
      font-family:'Press Start 2P',monospace;
      font-size:7px;letter-spacing:.1em;
      color:var(--mist-dark);
      text-decoration:none;
      display:flex;align-items:center;gap:.5rem;
      transition:color .2s;
    }
    .back-link:hover{color:var(--gold);}

    /* Rule */
    .rule{width:100%;max-width:580px;height:1px;background:linear-gradient(90deg,transparent,var(--blue),transparent);margin:1.5rem 0;}
  </style>
</head>
<body>

  <!-- Header -->
  <div class="hub-header">
    <h1 class="hub-title">DIAMOND <em>IMPACT</em><br/>GAMES</h1>
    <p class="hub-sub">Kies je game en speel</p>
  </div>

  <!-- Tab switcher -->
  <div class="game-tabs" role="tablist">
    <button class="tab-btn active" data-game="hit" role="tab" aria-selected="true" aria-controls="frame-hit">
      <span class="tab-icon">⚾</span>
      <span class="tab-name">HIT THE BALL</span>
      <span class="tab-desc">SPATIEBALK TIMING</span>
    </button>
    <button class="tab-btn" data-game="catch" role="tab" aria-selected="false" aria-controls="frame-catch">
      <span class="tab-icon">🧤</span>
      <span class="tab-name">FIELD CATCH</span>
      <span class="tab-desc">VANG ALLE BALLEN</span>
    </button>
  </div>

  <!-- Game frames -->
  <div class="game-frames">

    <!-- Hit game -->
    <div class="game-frame active" id="frame-hit" role="tabpanel">
      <iframe
        id="iframe-hit"
        src="game-hit.html"
        height="480"
        title="Hit The Ball — Diamond Impact Baseball"
        scrolling="no"
      ></iframe>
    </div>

    <!-- Catch game -->
    <div class="game-frame" id="frame-catch" role="tabpanel">
      <iframe
        id="iframe-catch"
        src="game.html"
        height="600"
        title="Field Catch — Diamond Impact Baseball"
        scrolling="no"
        loading="lazy"
      ></iframe>
    </div>

  </div>

  <!-- Instructions -->
  <div class="instructions" id="instructions-hit">
    <div class="instr-item"><span class="key">SPATIEBALK</span> om te slaan</div>
    <div class="instr-item">op mobiel: <span class="key">SWING</span> knop</div>
    <div class="instr-item">raak de bal precies in de zone</div>
  </div>

  <div class="instructions" id="instructions-catch" style="display:none;">
    <div class="instr-item"><span class="key">← →</span> bewegen</div>
    <div class="instr-item">of <span class="key">A</span><span class="key">D</span></div>
    <div class="instr-item">vang alle ballen die neerkomen</div>
  </div>

  <div class="rule"></div>

  <a href="../index.html" class="back-link" target="_top" rel="noopener">← Terug naar de website</a>

  <script>
    const tabs  = document.querySelectorAll('.tab-btn');
    const frames = document.querySelectorAll('.game-frame');
    const instrHit   = document.getElementById('instructions-hit');
    const instrCatch = document.getElementById('instructions-catch');

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const game = tab.dataset.game;

        tabs.forEach(t => { t.classList.remove('active'); t.setAttribute('aria-selected','false'); });
        frames.forEach(f => f.classList.remove('active'));
        tab.classList.add('active');
        tab.setAttribute('aria-selected','true');
        document.getElementById('frame-' + game).classList.add('active');

        instrHit.style.display   = game === 'hit'   ? 'flex' : 'none';
        instrCatch.style.display = game === 'catch' ? 'flex' : 'none';
      });
    });
  </script>

</body>
</html>
