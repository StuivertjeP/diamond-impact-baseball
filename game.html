<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Diamond Impact — Field Catch</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Bebas+Neue&display=swap');
    :root {
      --navy:#060B14; --navy2:#0E1A2E; --navy3:#122040;
      --blue:#1E5FAD; --blueB:#4A9AEC;
      --gold:#D4942A; --goldL:#F0B840; --goldBr:#FFD060;
      --white:#EEF2F8; --mist:#8EA8C8;
      --green:#2A5C2A; --greenL:#3A7A3A; --greenD:#1E421E;
      --dirt:#8B5E3C; --dirtL:#A07040; --dirtD:#6B4828;
      --red:#C0392B;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      background:var(--navy);
      font-family:'Press Start 2P',monospace;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      min-height:100dvh;overflow:hidden;
      user-select:none;-webkit-user-select:none;touch-action:none;
    }
    #wrap{display:flex;flex-direction:column;align-items:center;width:100%;max-width:520px;padding:.6rem 1rem;gap:0;}

    /* HUD */
    #hud{display:flex;justify-content:space-between;align-items:center;width:100%;padding:.35rem 0 .5rem;border-bottom:2px solid var(--navy3);}
    .hud-block{display:flex;flex-direction:column;align-items:center;gap:3px;}
    .hud-lbl{font-size:6px;color:var(--mist);letter-spacing:.12em;}
    .hud-val{font-size:13px;color:var(--gold);}
    .hud-badge{font-size:7px;color:var(--navy);background:var(--gold);padding:3px 10px;letter-spacing:.1em;}
    .lives-row{display:flex;gap:5px;}
    .life{width:11px;height:11px;background:var(--gold);transform:rotate(45deg);}
    .life.lost{background:var(--navy3);border:1.5px solid rgba(255,255,255,.1);}

    /* Canvas */
    #canvas-wrap{position:relative;width:100%;}
    #canvas{width:100%;aspect-ratio:3/4;display:block;image-rendering:pixelated;}

    /* Overlay */
    #overlay{
      position:absolute;inset:0;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:1.1rem;
      background:rgba(6,11,20,.93);z-index:20;padding:2rem 1.5rem;text-align:center;
    }
    #overlay.hidden{display:none;}
    .ov-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,9vw,3.5rem);color:var(--gold);letter-spacing:.08em;line-height:1;}
    .ov-sub{font-size:6px;color:var(--mist);line-height:2.2;letter-spacing:.1em;}
    .ov-score{font-size:9px;color:var(--white);}
    .ov-score span{color:var(--gold);}
    .ov-score.hidden{display:none;}
    .play-btn{
      font-family:'Press Start 2P',monospace;font-size:8px;
      background:var(--gold);color:var(--navy);border:none;
      padding:13px 26px;cursor:pointer;letter-spacing:.12em;
      transition:background .15s,transform .1s;margin-top:.25rem;
    }
    .play-btn:hover{background:var(--goldL);}
    .play-btn:active{transform:scale(.97);}

    /* Feedback */
    #feedback{height:20px;font-size:8px;letter-spacing:.08em;display:flex;align-items:center;justify-content:center;margin-top:2px;}
    .fb-catch{color:var(--goldL);} .fb-miss{color:var(--red);} .fb-bonus{color:var(--goldBr);}

    /* Touch joystick overlay — shown on touch devices */
    #joystick-hint{
      display:none;
      font-size:6px;letter-spacing:.1em;text-transform:uppercase;
      color:var(--mist-dark);opacity:.5;margin-top:4px;text-align:center;
    }
    @media(pointer:coarse){#joystick-hint{display:block;}}
  </style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <div class="hud-block"><span class="hud-lbl">SCORE</span><span class="hud-val" id="score-el">0</span></div>
    <div class="hud-block"><span class="hud-badge" id="level-el">LEVEL 1</span></div>
    <div class="hud-block">
      <span class="hud-lbl">LEVENS</span>
      <div class="lives-row" id="lives-el"><div class="life"></div><div class="life"></div><div class="life"></div></div>
    </div>
  </div>

  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
    <div id="overlay">
      <div class="ov-title" id="ov-title">FIELD CATCH</div>
      <div class="ov-sub" id="ov-sub">
        VANG ALLE BALLEN<br/>
        DIE NEERKOMEN<br/><br/>
        SLEEP JE VINGER<br/>
        OM TE BEWEGEN<br/><br/>
        ← → PIJLTJES OF A/D
      </div>
      <div class="ov-score hidden" id="ov-score">SCORE: <span id="final-score">0</span></div>
      <button class="play-btn" id="play-btn">▶ START</button>
    </div>
  </div>

  <div id="feedback">&nbsp;</div>

  <div id="joystick-hint">sleep je vinger op het scherm om te bewegen</div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const overlay= document.getElementById('overlay');
const W=480, H=640;
canvas.width=W; canvas.height=H;

const C={
  navy:'#060B14',navy2:'#0E1A2E',navy3:'#122040',
  blue:'#1E5FAD',blueB:'#4A9AEC',
  gold:'#D4942A',goldL:'#F0B840',goldBr:'#FFD060',
  white:'#EEF2F8',mist:'#8EA8C8',
  skin:'#5C3D2E',skinL:'#7A5238',
  orange:'#E8610A',orangeD:'#C45108',
  green:'#2A5C2A',greenL:'#3A7A3A',greenD:'#1E421E',
  dirt:'#8B5E3C',dirtL:'#A07040',dirtD:'#6B4828',
  red:'#C0392B',
};

/* ── STATE ── */
let state='idle', score=0, hiScore=0, lives=3, level=1, combo=0, caught=0, frame=0;
const PLAYER_Y=H-58, PLAYER_W=52;
let player={x:W/2, glove:0};
let balls=[], particles=[], keys={};
let spawnTimer=0, shakeFrames=0;

function spawnInterval(){ return Math.max(36, 88-level*6); }
function ballSpeed()    { return 2.4+level*0.32+Math.random()*0.5; }
function maxBalls()     { return Math.min(6, 2+Math.floor(level/2)); }

function spawnBall(){
  if(balls.length>=maxBalls()) return;
  const r=Math.random();
  let type='normal';
  if(r<0.08&&level>=3) type='gold';
  else if(r<0.18&&level>=2) type='fast';
  else if(r<0.28&&level>=4) type='curve';
  balls.push({
    x:32+Math.random()*(W-64), y:-14,
    vy:ballSpeed()*(type==='fast'?1.75:1),
    vx:type==='curve'?(Math.random()-0.5)*2.5:0,
    type, wobble:Math.random()*Math.PI*2, r:11, trail:[]
  });
}

/* ── FIELD ── */
function drawField(){
  /* Sky */
  ctx.fillStyle='#07101F';
  ctx.fillRect(0,0,W,H*0.28);

  /* Grass */
  ctx.fillStyle=C.green;
  ctx.fillRect(0,H*0.28,W,H*0.72);
  for(let i=0;i<W;i+=28){
    ctx.fillStyle=i%56===0?C.greenL:C.greenD;
    ctx.fillRect(i,H*0.28,14,H*0.72);
  }

  /* Perspective lines */
  const vx=W/2, vy=H*0.26;
  ctx.strokeStyle='rgba(238,242,248,0.1)';
  ctx.lineWidth=1;
  for(let xi=0;xi<=W;xi+=W/7){
    ctx.beginPath(); ctx.moveTo(vx,vy); ctx.lineTo(xi,H); ctx.stroke();
  }
  for(let yi=H*0.28;yi<H-72;yi+=44){
    const t=(yi-H*0.28)/(H*0.72);
    ctx.strokeStyle=`rgba(238,242,248,${t*0.08})`;
    ctx.beginPath(); ctx.moveTo(0,yi); ctx.lineTo(W,yi); ctx.stroke();
  }

  /* Warning track (dirt strip) */
  ctx.fillStyle=C.dirt;
  ctx.fillRect(0,H-72,W,72);
  for(let i=0;i<W;i+=8){
    ctx.fillStyle=i%16===0?C.dirtL:C.dirtD;
    ctx.fillRect(i,H-72,4,72);
  }
  ctx.strokeStyle='rgba(238,242,248,0.25)';
  ctx.lineWidth=2;
  ctx.setLineDash([8,5]);
  ctx.beginPath(); ctx.moveTo(0,H-72); ctx.lineTo(W,H-72); ctx.stroke();
  ctx.setLineDash([]);

  /* Catch zone glow (near player row) */
  const gz = ctx.createLinearGradient(0,PLAYER_Y-30,0,PLAYER_Y+30);
  gz.addColorStop(0,'rgba(212,148,42,0)');
  gz.addColorStop(0.5,'rgba(212,148,42,0.06)');
  gz.addColorStop(1,'rgba(212,148,42,0)');
  ctx.fillStyle=gz;
  ctx.fillRect(0,PLAYER_Y-30,W,60);

  /* Scoreboard */
  const bw=158,bh=34,bx=W/2-bw/2,by=8;
  ctx.fillStyle=C.navy3;
  ctx.fillRect(bx,by,bw,bh);
  ctx.strokeStyle=C.gold; ctx.lineWidth=2;
  ctx.strokeRect(bx,by,bw,bh);
  ctx.font=`6px 'Press Start 2P',monospace`;
  ctx.fillStyle=C.mist; ctx.textAlign='center';
  ctx.fillText('DIAMOND IMPACT',W/2,by+13);
  ctx.fillStyle=C.gold;
  ctx.font=`9px 'Press Start 2P',monospace`;
  ctx.fillText(`${score}`,W/2,by+27);
  ctx.textAlign='left';
}

/* ── BALL COLOURS ── */
function ballCol(type){
  if(type==='gold')  return {fill:C.goldBr, stroke:C.gold, seam:C.dirt};
  if(type==='fast')  return {fill:'#FF5555', stroke:C.red,  seam:'#fff'};
  if(type==='curve') return {fill:C.blueB,  stroke:C.blue, seam:'#fff'};
  return                    {fill:C.white,  stroke:'#aaa', seam:C.red};
}

function drawBall(b){
  /* Trail */
  b.trail.forEach((t,i)=>{
    const a=(i/b.trail.length)*0.28;
    ctx.beginPath();
    ctx.arc(t.x,t.y,b.r*(i/b.trail.length)*0.8,0,Math.PI*2);
    ctx.fillStyle=`rgba(74,154,236,${a})`;
    ctx.fill();
  });

  const col=ballCol(b.type);
  /* Size grows as it falls — depth cue */
  const rr=b.r*(0.65+(b.y/H)*0.55);

  /* Shadow */
  ctx.beginPath();
  ctx.ellipse(b.x+3,b.y+rr+2,rr*0.8,rr*0.3,0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.28)'; ctx.fill();

  /* Body */
  ctx.beginPath(); ctx.arc(b.x,b.y,rr,0,Math.PI*2);
  ctx.fillStyle=col.fill; ctx.fill();
  ctx.strokeStyle=col.stroke; ctx.lineWidth=2; ctx.stroke();

  /* Seams */
  ctx.strokeStyle=col.seam; ctx.lineWidth=1.2;
  const w=b.wobble+frame*0.07;
  ctx.beginPath(); ctx.arc(b.x-rr*0.28,b.y,rr*0.52,w-0.45,w+0.45); ctx.stroke();
  ctx.beginPath(); ctx.arc(b.x+rr*0.28,b.y,rr*0.52,w+Math.PI-0.45,w+Math.PI+0.45); ctx.stroke();

  /* Gold aura */
  if(b.type==='gold'){
    ctx.beginPath(); ctx.arc(b.x,b.y,rr+5,0,Math.PI*2);
    ctx.strokeStyle=`rgba(255,208,96,${0.3+0.2*Math.sin(frame*0.14)})`;
    ctx.lineWidth=3; ctx.stroke();
  }

  /* Incoming arrow (above field horizon) */
  if(b.y<H*0.28+10){
    const ax=Math.max(18,Math.min(W-18,b.x));
    ctx.fillStyle=col.fill;
    ctx.beginPath();
    ctx.moveTo(ax,H*0.28+6); ctx.lineTo(ax-7,H*0.28+16); ctx.lineTo(ax+7,H*0.28+16);
    ctx.closePath(); ctx.fill();
  }
}

/* ── PLAYER ── */
function drawPlayer(){
  const px=player.x, py=PLAYER_Y;

  /* Shadow */
  ctx.beginPath();
  ctx.ellipse(px,py+18,PLAYER_W*0.55,8,0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fill();

  /* Jersey */
  ctx.fillStyle=C.orange;
  ctx.fillRect(px-15,py-16,30,28);
  /* Sleeve stripes */
  ctx.fillStyle=C.navy3;
  ctx.fillRect(px-15,py-16,3,28);
  ctx.fillRect(px+12,py-16,3,28);

  /* Face */
  ctx.fillStyle=C.skin;
  ctx.beginPath(); ctx.arc(px,py-14,7,0,Math.PI*2); ctx.fill();

  /* Cap */
  ctx.fillStyle=C.blue;
  ctx.beginPath(); ctx.arc(px,py-20,10,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=C.navy3;
  ctx.fillRect(px-10,py-26,20,8);

  /* Jersey number */
  ctx.font=`7px 'Press Start 2P',monospace`;
  ctx.fillStyle=C.navy; ctx.textAlign='center';
  ctx.fillText('41',px,py+2);
  ctx.textAlign='left';

  /* Glove */
  const gx=px-26, gy=py-6+player.glove*5;
  ctx.beginPath(); ctx.arc(gx,gy,10+player.glove*3,0,Math.PI*2);
  ctx.fillStyle=C.dirtL; ctx.fill();
  ctx.strokeStyle=C.dirtD; ctx.lineWidth=1.5; ctx.stroke();
  if(player.glove>0.1){
    ctx.strokeStyle=C.goldL; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(gx,gy,14+player.glove*4,-0.6,0.6); ctx.stroke();
  }

  /* Catch ring */
  ctx.beginPath(); ctx.arc(px,py,PLAYER_W*0.52,0,Math.PI*2);
  ctx.strokeStyle=`rgba(212,148,42,${0.12+0.08*Math.sin(frame*0.1)})`;
  ctx.lineWidth=2; ctx.setLineDash([4,4]); ctx.stroke(); ctx.setLineDash([]);
}

/* ── PARTICLES ── */
function drawParticles(){
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.2; p.life--;
    ctx.globalAlpha=p.life/p.maxLife;
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x-p.s/2,p.y-p.s/2,p.s,p.s);
  });
  ctx.globalAlpha=1;
}

function spawnCatch(x,y,gold){
  const cols=gold?[C.goldBr,C.goldL,C.gold,'#fff']:[C.white,C.gold,C.mist];
  for(let i=0;i<(gold?32:14);i++){
    const a=Math.random()*Math.PI*2, spd=1.5+Math.random()*(gold?5:3);
    particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-2,
      life:22+Math.random()*16,maxLife:38,
      s:3+Math.random()*(gold?5:3),
      color:cols[Math.floor(Math.random()*cols.length)]});
  }
}

/* ── COMBO ── */
function drawCombo(){
  if(combo<2) return;
  ctx.font=`7px 'Press Start 2P',monospace`;
  ctx.fillStyle=C.goldL; ctx.textAlign='right';
  ctx.fillText(`${combo}x COMBO`,W-10,H*0.28+18);
  ctx.textAlign='left';
}

/* ── UPDATE ── */
function update(){
  if(state!=='playing') return;
  frame++;

  /* Player move */
  const spd=4.5+level*0.18;
  if(keys['ArrowLeft']||keys['a']||keys['A'])  player.x-=spd;
  if(keys['ArrowRight']||keys['d']||keys['D']) player.x+=spd;
  player.x=Math.max(PLAYER_W/2,Math.min(W-PLAYER_W/2,player.x));
  player.glove=Math.max(0,player.glove-0.12);

  /* Spawn */
  if(--spawnTimer<=0){ spawnBall(); spawnTimer=spawnInterval(); }

  /* Balls */
  const CATCH_R=PLAYER_W*0.52;
  for(let i=balls.length-1;i>=0;i--){
    const b=balls[i];
    b.trail.push({x:b.x,y:b.y});
    if(b.trail.length>6) b.trail.shift();
    b.y+=b.vy; b.x+=b.vx;
    if(b.x<b.r||b.x>W-b.r){b.vx*=-1; b.x=Math.max(b.r,Math.min(W-b.r,b.x));}

    /* Catch */
    const dx=b.x-player.x, dy=b.y-PLAYER_Y;
    if(Math.sqrt(dx*dx+dy*dy)<CATCH_R+b.r){
      caught++; combo++;
      const gold=b.type==='gold';
      const pts=gold?50*combo:(b.type==='fast'?20:10)*combo;
      score+=pts;
      player.glove=1;
      spawnCatch(b.x,b.y,gold);
      balls.splice(i,1);
      showFB(gold?`⭐ BONUS +${pts}`:`GEVANGEN! +${pts}`, gold?'fb-bonus':'fb-catch');
      if(caught%8===0) level=Math.min(12,level+1);
      updateHUD(); continue;
    }

    /* Missed */
    if(b.y>H+20){
      balls.splice(i,1); combo=0; lives--;
      shakeFrames=8;
      showFB('GEMIST!','fb-miss');
      updateHUD();
      if(lives<=0){setTimeout(gameOver,400); return;}
    }
  }
}

function showFB(txt,cls){
  const el=document.getElementById('feedback');
  el.textContent=txt; el.className=cls;
  clearTimeout(el._t);
  el._t=setTimeout(()=>{el.textContent='\u00a0';el.className='';},1100);
}

function updateHUD(){
  document.getElementById('score-el').textContent=score;
  document.getElementById('level-el').textContent='LEVEL '+level;
  const row=document.getElementById('lives-el');
  row.innerHTML='';
  for(let i=0;i<3;i++){
    const d=document.createElement('div');
    d.className='life'+(i>=lives?' lost':'');
    row.appendChild(d);
  }
}

function startGame(){
  score=0;lives=3;level=1;combo=0;caught=0;frame=0;
  balls=[];particles=[];shakeFrames=0;
  player.x=W/2; spawnTimer=60;
  state='playing';
  overlay.classList.add('hidden');
  updateHUD();
}

function gameOver(){
  state='dead';
  if(score>hiScore) hiScore=score;
  balls=[];
  document.getElementById('ov-title').textContent='GAME OVER';
  document.getElementById('ov-sub').innerHTML=`HI-SCORE: ${hiScore}<br/><br/>GEVANGEN: ${caught}`;
  const os=document.getElementById('ov-score');
  os.classList.remove('hidden');
  document.getElementById('final-score').textContent=score;
  document.getElementById('play-btn').textContent='▶ OPNIEUW';
  overlay.classList.remove('hidden');
}

/* ── LOOP ── */
function loop(){
  let ox=0,oy=0;
  if(shakeFrames>0){ox=(Math.random()-.5)*6;oy=(Math.random()-.5)*6;shakeFrames--;}
  ctx.save(); ctx.translate(ox,oy);
  ctx.clearRect(-10,-10,W+20,H+20);
  drawField();
  drawParticles();
  balls.forEach(drawBall);
  if(state==='playing'||state==='dead') drawPlayer();
  drawCombo();
  ctx.restore();
  update();
  requestAnimationFrame(loop);
}

/* ── INPUT — keyboard ── */
window.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(['ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  if(e.key===' '&&state!=='playing') startGame();
});
window.addEventListener('keyup',e=>{keys[e.key]=false;});

document.getElementById('play-btn').addEventListener('click',startGame);

/* ── INPUT — touch: drag finger to move player directly ── */
let touchX = null;   // last touch X on canvas
let touchStartX = null;
let playerStartX = null;

function canvasTouchX(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  return (e.touches[0].clientX - rect.left) * scaleX;
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if(state !== 'playing') { startGame(); return; }
  touchStartX  = canvasTouchX(e);
  playerStartX = player.x;
  touchX       = touchStartX;
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if(state !== 'playing') return;
  touchX = canvasTouchX(e);
  /* Move player relative to drag delta — feels like dragging the fielder */
  const delta = touchX - touchStartX;
  player.x = Math.max(PLAYER_W/2, Math.min(W - PLAYER_W/2, playerStartX + delta));
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  touchX = null;
}, { passive: false });

loop();
</script>
</body>
</html>
